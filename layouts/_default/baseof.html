<!DOCTYPE html>
<html lang="{{ .Site.Language.LanguageCode | default "en" }}">
<head>
    <script>(function(){if(typeof sessionStorage!=='undefined'&&!sessionStorage.getItem('tce_auth')){window.location.replace('{{ "login/" | absLangURL }}');}})();</script>
    {{ partial "head.html" . }}
    {{ with (templates.Defer (dict "key" "global")) }}
        {{ partial "css.html" . }}
    {{ end }}
</head>
<body class="bg-bg text-text font-primary">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:left-4 focus:top-4 focus:z-50 focus:bg-bg focus:px-3 focus:py-2">
        Skip to main content
    </a>

    {{ partial "header.html" . }}

    <main id="main-content" class="mx-auto w-full max-w-5xl px-4 sm:px-6 lg:px-8 py-10" tabindex="-1">
        {{ block "main" . }}{{ end }}
    </main>

    {{ partial "footer.html" . }}
</body>
</html>
