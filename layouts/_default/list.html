{{ define "main" }}
<section class="space-y-7 font-primary text-text">
  <h1 class="font-secondary text-3xl font-bold tracking-tight text-primary md:text-4xl">{{ .Title }}</h1>
  {{ with .Content }}
  <div class="space-y-4 text-text/80">
    {{ . }}
  </div>
  {{ end }}

  <ul class="space-y-4">
    {{ range .Pages.ByDate.Reverse }}
    <li class="rounded-2xl border border-primary/20 bg-white/80 p-5 shadow-sm transition-shadow duration-300 hover:shadow-lg">
      <a href="{{ .RelPermalink }}" class="font-secondary text-xl font-bold text-primary no-underline transition-colors duration-200 hover:text-secondary">{{ .Title }}</a>
      {{ with .Description }}
      <p class="mt-2 text-text/70">{{ . }}</p>
      {{ end }}
    </li>
    {{ else }}
    <li class="text-text/70">No content found.</li>
    {{ end }}
  </ul>
</section>
{{ end }}
