<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex, notranslate, nocache">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex, notranslate">
<meta name="bingbot" content="noindex, nofollow, noarchive, nosnippet, noimageindex, notranslate">
<link rel="canonical" href="{{ .Permalink }}">
{{ with .OutputFormats.Get "RSS" }}
<link rel="alternate" type="application/rss+xml" title="{{ $.Site.Title }}" href="{{ .Permalink }}">
{{ end }}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8Nt1XV0o0+igFsA47P5hk6S9L4b0k8Q==" crossorigin="anonymous" referrerpolicy="no-referrer">
{{ with .Site.Params.favicon }}
<link rel="icon" type="image/svg+xml" href="{{ . | relURL }}">
{{ else }}
<link rel="icon" type="image/x-icon" href="{{ "favicon.ico" | relURL }}">
{{ end }}
<script src="https://kit.fontawesome.com/1dae46d9bf.js" crossorigin="anonymous"></script>
