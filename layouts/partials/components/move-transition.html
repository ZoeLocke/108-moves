<div class="w-full" aria-hidden="true">
  <div class="mx-auto h-3.5 w-0.5 bg-secondary/70 group-data-[size=small]/move-flow:h-2.5 group-data-[size=large]/move-flow:h-5"></div>

  {{ with .note }}
  <div class="mx-auto flex w-fit items-center gap-2 rounded-full bg-white/70 px-3.5 py-1 text-lg leading-snug text-text shadow-sm ring-1 ring-primary/15 group-data-[size=small]/move-flow:gap-1.5 group-data-[size=small]/move-flow:px-2.5 group-data-[size=small]/move-flow:py-0.5 group-data-[size=small]/move-flow:text-base group-data-[size=large]/move-flow:gap-3 group-data-[size=large]/move-flow:px-4 group-data-[size=large]/move-flow:py-0.5 group-data-[size=large]/move-flow:text-2xl">
    <span class="inline-flex shrink-0 items-center justify-center leading-none text-secondary">
      <i class="fa-solid fa-code-commit inline-flex h-6 w-6 group-data-[size=small]/move-flow:h-5 group-data-[size=small]/move-flow:w-5 group-data-[size=large]/move-flow:h-8 group-data-[size=large]/move-flow:w-8" aria-hidden="true"></i>
    </span>
    <p>{{ . }}</p>
  </div>
  {{ end }}

  <div class="mx-auto h-3.5 w-0.5 bg-secondary/70 group-data-[size=small]/move-flow:h-2.5 group-data-[size=large]/move-flow:h-5"></div>
</div>
