<header class="sticky top-0 z-50 bg-primary shadow-md">
  <div class="site-container flex items-center justify-between py-4">
    <a href="{{ "/" | relLangURL }}" class="font-secondary text-lg font-bold text-text hover:text-body transition-colors duration-200 no-underline">
      {{ .Site.Title }}
    </a>

    <nav aria-label="Main navigation" class="flex items-center gap-5 text-sm font-primary">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL | relLangURL }}" class="text-text hover:text-body transition-colors duration-200 no-underline text-lg" title="{{ .Name }}">
        {{ .Name }}
      </a>
      {{ end }}
      <button id="logout-button" type="button" class="inline-flex cursor-pointer items-center gap-1.5 text-text transition-colors duration-200 hover:text-body text-lg ml-6" title="Sign out">
        <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>
        <span>Sign out</span>
      </button>
    </nav>
    <script>
      document.getElementById('logout-button').addEventListener('click', function () {
        sessionStorage.removeItem('tce_auth');
        window.location.replace('{{ "/login/" | relLangURL }}');
      });
    </script>
  </div>
</header>
