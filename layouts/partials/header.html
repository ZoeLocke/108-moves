<header class="sticky top-0 z-50 bg-primary shadow-md">
  <div class="mx-auto w-full max-w-5xl px-4 sm:px-6 lg:px-8 flex items-center justify-between py-4">
    <a href="{{ "" | absLangURL }}" class="font-secondary text-lg font-bold text-text hover:text-body transition-colors duration-200 no-underline">
      {{ .Site.Title }}
    </a>

    <nav aria-label="Main navigation" class="flex items-center gap-5 text-sm font-primary">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL | relLangURL }}" class="text-text hover:text-body transition-colors duration-200 no-underline text-lg" title="{{ .Name }}">
        {{ .Name }}
      </a>
      {{ end }}
      <button id="logout-button" type="button" class="group inline-flex cursor-pointer items-center gap-1.5 text-text transition-colors duration-200 hover:text-body text-lg ml-6" title="Sign out">
        {{- partial "components/icon.html" (dict "type" "log-out" "color" "current") -}}
        <span>Sign out</span>
      </button>
    </nav>
    <script>
      document.getElementById('logout-button').addEventListener('click', function () {
        sessionStorage.removeItem('tce_auth');
        window.location.replace('{{ "login/" | absLangURL }}');
      });
    </script>
  </div>
</header>
